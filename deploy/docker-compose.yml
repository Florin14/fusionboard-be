name: fusionboard_be

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: >
      sh -c "python -m services.run_migration &&
             uvicorn services.run_api:api --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips='*'"
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      AUTHJWT_SECRET_KEY: ${AUTHJWT_SECRET_KEY}
      AUTHJWT_TOKEN_LOCATION: ${AUTHJWT_TOKEN_LOCATION:-cookies}
      AUTHJWT_COOKIE_SAMESITE: ${AUTHJWT_COOKIE_SAMESITE:-none}
      AUTHJWT_COOKIE_SECURE: ${AUTHJWT_COOKIE_SECURE:-true}
      AUTHJWT_COOKIE_CSRF_PROTECT: ${AUTHJWT_COOKIE_CSRF_PROTECT:-false}
      FOOTBALL_TRACKING_API_URL: ${FOOTBALL_TRACKING_API_URL}
      FOOTBALL_TRACKING_API_KEY: ${FOOTBALL_TRACKING_API_KEY}
      PORT: ${PORT:-8000}
    ports:
      - "8000:8000"

volumes:
  caddy_data:
  caddy_config:
